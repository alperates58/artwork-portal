server {
    listen 80;
    server_name _;

    # HTTP → HTTPS yönlendirme (SSL kurulunca bu bloğu aktif et)
    # return 301 https://$host$request_uri;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    # Büyük dosya yükleme
    client_max_body_size 1200M;
    client_body_timeout  600s;
    client_body_buffer_size 128k;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Güvenlik header'ları
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    600;
        fastcgi_send_timeout    600;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
    }

    # Dosya uzantılarına direkt erişimi engelle
    location ~* \.(pdf|ai|eps|zip|psd|ai|indd)$ {
        deny all;
        return 403;
    }

    # Gizli dosyalara erişimi engelle
    location ~ /\. {
        deny all;
    }

    # Static asset cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    access_log /var/log/nginx/artwork_access.log;
    error_log  /var/log/nginx/artwork_error.log;
}

